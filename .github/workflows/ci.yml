name: TSTL CI Pipeline

on:
  push:
    branches: [ main, Gtests ]
  pull_request:
    branches: [ main, Gtests ]

jobs:
  lint-and-format:
    name: Lint & Style Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang-Format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Verify Code Style Compliance
        run: |
          find allocator/ Queues/ common/ tests/ -name '*.h' -o -name '*.hpp' -o -name '*.cpp' | xargs clang-format --dry-run --Werror -style=file

  build-and-test:
    name: ${{ matrix.compiler }} (C++${{ matrix.cxx_version }}) - ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    needs: lint-and-format
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        cxx_version: [20, 23]
        build_type: [Debug, Release]
        include:
          - compiler: gcc
            cc: gcc-14
            cxx: g++-14
          - compiler: clang
            cc: clang-18
            cxx: clang++-18

    steps:
      - uses: actions/checkout@v4

      - name: Install Native Toolchain Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache g++-14 clang-18

      - name: Configure Compiler Caching (ccache)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ matrix.compiler }}-cxx${{ matrix.cxx_version }}-${{ matrix.build_type }}-${{ github.sha }}
          restore-keys: |
            ${{ matrix.compiler }}-cxx${{ matrix.cxx_version }}-${{ matrix.build_type }}-

      - name: Configure CMake (Ninja)
        run: |
          ccache -z
          cmake -G Ninja -B build \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_CXX_STANDARD=${{ matrix.cxx_version }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DTSTL_BUILD_TESTS=ON

      - name: Build TSTL
        run: cmake --build build --parallel $(nproc)

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure -j $(nproc)

  thread-sanitizer:
    name: ThreadSanitizer (TSan Run)
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4

      - name: Install Native Clang & Ninja
        run: |
          sudo apt-get update && sudo apt-get install -y ninja-build clang-18

      - name: Configure CMake with TSan
        run: |
          cmake -G Ninja -B build-tsan \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_CXX_STANDARD=23 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer" \
            -DTSTL_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build-tsan --parallel $(nproc)

      - name: Execute Tests under TSan
        working-directory: build-tsan
        run: ctest --output-on-failure

  address-and-ub-sanitizer:
    name: ASan & UBSan (Memory Run)
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4

      - name: Install Native Clang & Ninja
        run: |
          sudo apt-get update && sudo apt-get install -y ninja-build clang-18

      - name: Configure CMake with ASan & UBSan
        run: |
          cmake -G Ninja -B build-asan \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_CXX_STANDARD=23 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DTSTL_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build-asan --parallel $(nproc)

      - name: Execute Tests under ASan/UBSan
        working-directory: build-asan
        run: ctest --output-on-failure